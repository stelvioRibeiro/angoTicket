<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | TicketApp</title>
<style>
body{ margin:0; font-family:'Segoe UI'; background:#f1f5f9; }
header{ background:#0f172a; color:white; padding:20px; display:flex; justify-content:space-between; }
header button{ background:#ef4444; color:white; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }
.sidebar{ 
  width:80px;
   background:#1e293b; 
   color:white;
    height:100vh; 
    position:fixed;
     padding-top:30px; 
     transition: width 1s;
    }
    .sidebar:hover{
      width: 220px;
     
    }

.sidebar:hover + #createEvent{
   margin-left: 260px;
    width: calc(100% - 260px);
}

.sidebar a{ display:block; padding:15px; color:white; text-decoration:none; transition:0.3s; }
.sidebar a:hover{ background:#2563eb; }
.main{ 
  margin-left:220px;
   padding:30px; 
    animation: fadeIn 1s ease-in-out;
  }
.card{ background:white; padding:25px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin-bottom:20px; }
input{ padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd; width:100%; }
button.submit{ background:#2563eb; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; }
button.submit:hover{ background:#1d4ed8; }
@media(max-width:768px){ .sidebar{ width:100%; height:auto; position:relative; } .main{ margin-left:0; } }
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>
<header>
  <h1>Dashboard</h1>
  <button onclick="logout()">Sair</button>
</header>
<div class="sidebar">
  <a href="#myEvents">Meus Eventos</a>
  <a href="#createEvent">Criar Evento</a>
</div>
<div class="main">
  <section id="createEvent">
    <h2>Criar Evento</h2>
    <input type="text" id="title" placeholder="Título">
    <input type="text" id="city" placeholder="Cidade">
    <input type="number" id="price" placeholder="Preço Kz">
    <input type="date" id="date">
    <input type="file" id="image">
    <button class="submit" onclick="createEvent()">Criar Evento</button>
  </section>
  <section id="myEvents">
    <h2>Meus Eventos</h2>
  </section>
</div>
<script src="js/app.js"></script>
<script>
checkAuth();
loadMyEvents();
</script>
</body>
</html>
