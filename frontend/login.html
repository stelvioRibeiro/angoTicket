<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | TicketApp</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.container{
  background:white;
  padding:40px;
  border-radius:20px;
  display: flex;
  justify-content: center;
  flex-direction: column;
  width:350px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  gap: 15px;
  animation: fadeIn 1s ease-in-out;
}
h1{
  text-align: center;
    margin-bottom:25px; 
    color:#0f172a; 
  }
input{
  width:95%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}
input:focus{
   border-color:#2563eb; 
   outline:none;
   }
button{
  width:102%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{ 
  background:#0f172a;
  transform: scale(1.05);
  transition: 1s;
 }
p{
  text-align:center; 
  margin-top:15px;
}
.criarConta{
  color:#2563eb; 
  text-decoration:none;
}
.criarConta:hover{
  color: #0c2e8a;
}
@media(max-width:480px){
   .container{
    width:90%; 
    padding:30px;
  } 
}
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>
<section class="container">
  <h1>Login</h1>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p>Não tem conta? <a class="criarConta" href="singUp.html">Registrar</a></p>
</section>
<script src="js/app.js"></script>
</body>
</html>
