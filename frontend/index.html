<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos | TicketApp</title>

<!-- CSS Premium -->
<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  align-items:center;
}
header h1{
  margin:0;
}
nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
}
.events{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
  padding:20px;
}
.card{
  background:white;
  color:black;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  transition:0.3s;
}
.card:hover{ transform:translateY(-10px); }
.card img{ width:100%; height:200px; object-fit:cover; }
.card h3{ margin:10px; }
.card p{ margin:5px 10px; }
button{
  background:#2563eb;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  color:white;
  cursor:pointer;
  margin:10px;
  
}
@media(max-width:768px){
  header{flex-direction:column;gap:10px;}
}

</style>

</head>
<body>
<header>
  <h1>TicketApp</h1>
  <nav>
    <a href="login.html">Login</a>
    <a href="singUp.html">Registrar</a>
  </nav>
</header>

<div class="events" id="eventsContainer"></div>

<script src="js/app.js"></script>
<script>
loadEvents();
</script>
</body>
</html>
